<div class="topbar">
  <div class="brand-left">
     <!-- Configurar URL del Logo aquí -->
     <img id="appLogo" alt="Logo" class="brand-logo" hidden>
  </div>

  <div class="brand-center">
    <div class="brand-title">Segmentación de Presupuesto</div>
    <div class="brand-subtitle">Dashboard por año • Segmentación sobre disponible</div>
  </div>

  <nav class="nav">
    <button class="nav-btn" id="navDashboard">Dashboard</button>
    <button class="nav-btn" id="navRegional">Detalle por Regional</button>
    <button class="nav-btn" id="navAdmin" hidden>Administración</button>
  </nav>
</div>

<!-- Overlay de carga -->
<div id="overlay" class="overlay" hidden>
  <div class="overlay-card">
    <div class="spinner"></div>
    <div id="overlayText">Cargando…</div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="overlay" hidden>
  <div class="modal-card">
    <div class="modal-title" id="mTitle">Mensaje</div>
    <div class="modal-msg" id="mMsg"></div>
    <div class="modal-actions">
      <button class="btn" id="mCancel" hidden>Cancelar</button>
      <button class="btn btn-primary" id="mOk">Aceptar</button>
    </div>
  </div>
</div>

<!-- Modal Detalle Segmentación -->
<div id="modalDetail" class="overlay" hidden>
  <div class="modal-card" style="width: min(800px, 95vw);">
    <div class="modal-title">Detalle de Segmentación por Regional</div>
    <div class="modal-msg" style="max-height: 60vh; overflow-y: auto; white-space: normal;">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Regional</th>
              <th>Monto Segmentado</th>
            </tr>
          </thead>
          <tbody id="tblSegDetailBody"></tbody>
          <tfoot>
            <tr>
              <th>Total</th>
              <th id="tSegDetailTotal"></th>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="document.getElementById('modalDetail').hidden = true">Cerrar</button>
    </div>
  </div>
</div>
