<script>
  const Busy = {
    _count: 0,
    show(msg){
      this._count++;
      document.getElementById('overlayText').textContent = msg || 'Cargando…';
      document.getElementById('overlay').hidden = false;
    },
    hide(){
      this._count = Math.max(0, this._count - 1);
      if (this._count === 0) document.getElementById('overlay').hidden = true;
    },
    reset(){
      this._count = 0;
      document.getElementById('overlay').hidden = true;
    }
  };

  function modal(msg, title, opts){
    const m = document.getElementById('modal');
    const t = document.getElementById('mTitle');
    const b = document.getElementById('mMsg');
    const ok = document.getElementById('mOk');
    const cancel = document.getElementById('mCancel');

    t.textContent = title || 'Mensaje';
    b.textContent = msg || '';
    cancel.hidden = true;

    return new Promise(resolve => {
      ok.onclick = () => { m.hidden = true; resolve(true); };
      cancel.onclick = () => { m.hidden = true; resolve(false); };

      if (opts && opts.confirm) {
        cancel.hidden = false;
        cancel.textContent = opts.cancelText || 'Cancelar';
        ok.textContent = opts.okText || 'Aceptar';
      } else {
        ok.textContent = 'Aceptar';
      }

      m.hidden = false;
    });
  }

  function callServer(fn, payload){
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(res => {
          if (res === null || res === undefined) {
             console.error(`callServer[${fn}] returned null/undefined`, res);
             return reject(new Error(`Respuesta vacía del servidor en ${fn}.`));
          }
          resolve(res);
        })
        .withFailureHandler(err => {
          console.error(`callServer[${fn}] failure`, err);
          reject(err);
        })
        [fn](payload);
    });
  }

  // Formato monetario (si config.currencyCode está vacío, se muestra número)
  let APP_LOCALE = 'es-DO';
  let APP_CURRENCY = '';

  function fmtMoney(n){
    const num = Number(n || 0);
    if (APP_CURRENCY) {
      return new Intl.NumberFormat(APP_LOCALE, { style:'currency', currency: APP_CURRENCY }).format(num);
    }
    return new Intl.NumberFormat(APP_LOCALE, { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
  }

  // Navegación
  function showView(id){
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if (id === 'viewDashboardSection') document.getElementById('navDashboard').classList.add('active');
    if (id === 'viewRegionalSection') document.getElementById('navRegional').classList.add('active');
    if (id === 'viewAdminSection') document.getElementById('navAdmin').classList.add('active');
  }

  let YEARS = [];
  let CURRENT_YEAR = null;
  let DASH_CACHE = null;

  async function bootstrap(){
    Busy.show('Inicializando…');
    try {
      const res = await callServer('apiBootstrap');
      if (!res.ok) throw new Error(res.message || 'No autorizado');

      YEARS = res.data.years || [];
      CURRENT_YEAR = YEARS[0] || (new Date()).getFullYear();

      APP_LOCALE = (res.data.config && res.data.config.locale) || 'es-DO';
      APP_CURRENCY = (res.data.config && res.data.config.currencyCode) || '';

      const logoUrl = res.data.config && res.data.config.logoUrl;
      const signatureUrl = res.data.config && res.data.config.signatureUrl;

      const logoEl = document.getElementById('appLogo');
      if (logoUrl) {
          logoEl.src = logoUrl;
          logoEl.style.width = res.data.config.logoWidth || 'auto';
          logoEl.style.height = res.data.config.logoHeight || '40px';
          logoEl.hidden = false;
      } else {
          logoEl.hidden = true;
      }

      const sigEl = document.getElementById('footerSig');
      if (signatureUrl) {
          sigEl.src = signatureUrl;
          sigEl.style.width = res.data.config.signatureWidth || 'auto';
          sigEl.style.height = res.data.config.signatureHeight || '40px';
          sigEl.hidden = false;
      } else {
          sigEl.hidden = true;
      }

      // Roles UI
      const isAdmin = SESSION_USER.role === 'ADMIN';
      document.getElementById('navAdmin').hidden = !isAdmin;
      document.getElementById('segFormWrap').hidden = !isAdmin;
      document.getElementById('segLabelWrap').hidden = !isAdmin;
      document.getElementById('segBtnWrap').hidden = !isAdmin;
      document.getElementById('thActions').hidden = false;

      // Fill years selects
      fillSelect('yearSelect', YEARS, CURRENT_YEAR);
      fillSelect('yearSelectRegional', YEARS, CURRENT_YEAR);

      // Events
      document.getElementById('navDashboard').onclick = () => showView('viewDashboardSection');
      document.getElementById('navRegional').onclick = () => showView('viewRegionalSection');
      document.getElementById('navAdmin').onclick = () => { showView('viewAdminSection'); loadUsers(); };

      document.getElementById('yearSelect').onchange = () => loadDashboard();
      document.getElementById('btnSegmentar').onclick = () => onSegmentar();

      document.getElementById('btnLoadRegional').onclick = () => loadRegionalDetail(true);
      document.getElementById('btnPrev').onclick = () => pageRegional(-1);
      document.getElementById('btnNext').onclick = () => pageRegional(+1);

      document.getElementById('btnSaveUser').onclick = () => saveUser();

      // Inicial
      showView('viewDashboardSection');
      await loadDashboard();
    } catch (e) {
      await modal(String(e.message || e), 'Error');
    } finally {
      Busy.hide();
    }
  }

  function fillSelect(id, items, selected){
    const el = document.getElementById(id);
    el.innerHTML = '';
    (items || []).forEach(v => {
      const opt = document.createElement('option');
      opt.value = String(v);
      opt.textContent = String(v);
      if (String(v) === String(selected)) opt.selected = true;
      el.appendChild(opt);
    });
  }

  async function loadDashboard(){
    const year = Number(document.getElementById('yearSelect').value);
    document.getElementById('displayYear').textContent = year; // Update big year display

    Busy.show('Cargando dashboard…');
    try {
      const res = await callServer('apiGetDashboard', { year });
      if (!res.ok) throw new Error(res.message || 'Error');

      DASH_CACHE = res.data;

      document.getElementById('tBase').textContent = fmtMoney(res.data.totals.base);
      document.getElementById('tSeg').textContent = fmtMoney(res.data.totals.segmented);
      document.getElementById('tRem').textContent = fmtMoney(res.data.totals.remaining);

      renderRegionals(res.data.regionals || []);
      renderSegs(res.data.segmentations || []);
      fillRegionalOptionsFromDashboard(res.data.regionals || []);
    } catch (e) {
      await modal(String(e.message || e), 'Error');
    } finally {
      Busy.hide();
    }
  }

  function renderRegionals(rows){
    const tb = document.getElementById('tblRegionals');
    tb.innerHTML = '';
    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="pill">${escapeHtml(r.regional)}</span></td>
        <td>${fmtMoney(r.base)}</td>
        <td>${fmtMoney(r.segmented)}</td>
        <td><b>${fmtMoney(r.remaining)}</b></td>
      `;
      tb.appendChild(tr);
    });
  }

  function renderSegs(rows){
    const tb = document.getElementById('tblSegs');
    tb.innerHTML = '';
    const isAdmin = SESSION_USER.role === 'ADMIN';

    rows.forEach(r => {
      const dt = r.createdAt ? new Date(r.createdAt) : null;
      const dateTxt = dt ? dt.toLocaleString(APP_LOCALE) : '';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escapeHtml(dateTxt)}</td>
        <td>${escapeHtml(r.label || '')}</td>
        <td>${Number(r.pct || 0).toFixed(2)}%</td>
        <td>${fmtMoney(r.totalSegmented || 0)}</td>
        <td>${escapeHtml(r.createdBy || '')}</td>
        <td>
           <button class="btn btn-primary" onclick="showSegmentationDetail('${escapeHtml(r.segId)}')">Ver</button>
           ${isAdmin ? `<button class="btn btn-danger" data-id="${escapeHtml(r.segId)}">Eliminar</button>` : ''}
        </td>
      `;
      tb.appendChild(tr);
    });

    if (isAdmin) {
      tb.querySelectorAll('button[data-id]').forEach(btn => {
        btn.onclick = async () => {
          const segId = btn.getAttribute('data-id');
          const ok = await modal('¿Eliminar esta segmentación? Esto recalcula el disponible.', 'Confirmar', { confirm: true, okText: 'Sí, eliminar' });
          if (!ok) return;
          Busy.show('Eliminando…');
          try {
            const year = Number(document.getElementById('yearSelect').value);
            const res = await callServer('apiDeleteSegmentation', { segId, year });
            if (!res.ok) throw new Error(res.message || 'Error');
            await loadDashboard();
          } catch (e) {
            await modal(String(e.message || e), 'Error');
          } finally {
            Busy.hide();
          }
        };
      });
    }
  }

  async function onSegmentar(){
    const year = Number(document.getElementById('yearSelect').value);
    const pct = Number(document.getElementById('pctInput').value);
    const label = String(document.getElementById('labelInput').value || '').trim();

    if (!(pct > 0 && pct <= 100)) {
      await modal('Porcentaje debe ser > 0 y <= 100.', 'Validación');
      return;
    }

    Busy.show('Aplicando segmentación…');
    try {
      const res = await callServer('apiCreateSegmentation', { year, pct, label });
      if (!res.ok) throw new Error(res.message || 'Error');
      document.getElementById('pctInput').value = '';
      document.getElementById('labelInput').value = '';
      await loadDashboard();
    } catch (e) {
      await modal(String(e.message || e), 'Error');
    } finally {
      Busy.hide();
    }
  }

  function fillRegionalOptionsFromDashboard(regionals){
    const sel = document.getElementById('regionalSelect');
    if (!sel) return;
    const cur = sel.value;
    sel.innerHTML = '';
    regionals.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.regional;
      opt.textContent = r.regional;
      sel.appendChild(opt);
    });
    if (cur) sel.value = cur;
  }

  // Regional detail - Filter & Logic
  let RAW_BASE_ROWS = [];
  let RAW_BASE_COLS = [];

  async function loadRegionalDetail(){
    const year = Number(document.getElementById('yearSelectRegional').value);
    const regional = String(document.getElementById('regionalSelect').value || '').trim();
    if (!regional) return modal('Selecciona una regional.', 'Validación');

    Busy.show('Cargando regional…');
    try {
      // Pedimos sin paginación (limit=5000 en servidor)
      const res = await callServer('apiGetRegionalDetail', { year, regional });
      if (!res.ok) throw new Error(res.message || 'Error');

      document.getElementById('rBase').textContent = fmtMoney(res.data.totals.base);
      document.getElementById('rSeg').textContent = fmtMoney(res.data.totals.segmented);
      document.getElementById('rRem').textContent = fmtMoney(res.data.totals.remaining);

      renderRegionalSegs(res.data.segmentations || []);

      // Store raw data for client-side filtering
      RAW_BASE_ROWS = (res.data.baseTable || {}).rows || [];
      RAW_BASE_COLS = (res.data.baseTable || {}).columns || [];

      // Setup filters
      setupProvinceFilter(RAW_BASE_ROWS, RAW_BASE_COLS);

      // Initial Render
      filterAndRenderBaseTable();

    } catch (e) {
      console.error('loadRegionalDetail error', e);
      await modal(String(e.message || e), 'Error');
    } finally {
      Busy.hide();
    }
  }

  document.getElementById('regionalFilter').addEventListener('keyup', () => {
      filterAndRenderBaseTable();
  });

  document.getElementById('provinceSelect').addEventListener('change', () => {
      renderProvinceBreakdown();
  });

  function setupProvinceFilter(rows, cols) {
     const pIdx = cols.indexOf('Provincia'); // Ajustar si el nombre es diferente
     const sel = document.getElementById('provinceSelect');
     sel.innerHTML = '<option value="">-- Selecciona Provincia (Ver desglose) --</option><option value="ALL">Todas (Ver desglose completo)</option>';

     if (pIdx === -1) return;

     const provs = new Set();
     rows.forEach(r => {
         const p = String(r[pIdx] || '').trim();
         if (p) provs.add(p);
     });

     const sorted = Array.from(provs).sort();
     sorted.forEach(p => {
         const opt = document.createElement('option');
         opt.value = p;
         opt.textContent = p;
         sel.appendChild(opt);
     });
  }

  function renderProvinceBreakdown() {
      const sel = document.getElementById('provinceSelect').value;
      const container = document.getElementById('provinceDetailContainer');
      container.innerHTML = '';

      if (!sel) return; // Nada seleccionado

      const pIdx = RAW_BASE_COLS.indexOf('Provincia');
      const presIdx = RAW_BASE_COLS.indexOf('Presupuesto');

      if (pIdx === -1 || presIdx === -1) return;

      const provinces = (sel === 'ALL')
          ? Array.from(new Set(RAW_BASE_ROWS.map(r => String(r[pIdx]||'')))).sort()
          : [sel];

      provinces.forEach(prov => {
          if (!prov) return;
          // Filter rows
          const rows = RAW_BASE_ROWS.filter(r => String(r[pIdx]||'') === prov);
          if (!rows.length) return;

          // Calculate total
          let total = 0;
          rows.forEach(r => {
              const val = typeof r[presIdx] === 'number' ? r[presIdx] : parseFloat(String(r[presIdx]).replace(/[^0-9.-]/g,'')) || 0;
              total += val;
          });

          // Create table
          const card = document.createElement('div');
          card.className = 'card';
          card.style.marginBottom = '16px';

          const title = document.createElement('div');
          title.style.fontWeight = '800';
          title.style.marginBottom = '8px';
          title.style.color = 'var(--primary)';
          title.textContent = `Provincia: ${prov}`;

          const tableWrap = document.createElement('div');
          tableWrap.className = 'table-responsive';

          const table = document.createElement('table');
          const thead = document.createElement('thead');
          thead.innerHTML = `<tr>${RAW_BASE_COLS.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr>`;

          const tbody = document.createElement('tbody');
          rows.forEach(r => {
              const tr = document.createElement('tr');
              tr.innerHTML = r.map(c => `<td>${escapeHtml(c)}</td>`).join('');
              tbody.appendChild(tr);
          });

          // Footer with total
          const tfoot = document.createElement('tfoot');
          tfoot.innerHTML = `<tr><td colspan="${RAW_BASE_COLS.length}" style="text-align:right; font-weight:800; background:#f9fafb;">Total: ${fmtMoney(total)}</td></tr>`;

          table.appendChild(thead);
          table.appendChild(tbody);
          table.appendChild(tfoot);
          tableWrap.appendChild(table);

          card.appendChild(title);
          card.appendChild(tableWrap);
          container.appendChild(card);
      });
  }

  function filterAndRenderBaseTable(){
      const term = String(document.getElementById('regionalFilter').value || '').toLowerCase().trim();
      let filtered = RAW_BASE_ROWS;

      if (term) {
          const tokens = term.split(/\s+/);
          filtered = RAW_BASE_ROWS.filter(row => {
             const rowStr = row.map(c => String(c)).join(' ').toLowerCase();
             return tokens.some(t => rowStr.includes(t));
          });
      }

      renderBaseTable({ columns: RAW_BASE_COLS, rows: filtered });
  }

  function renderRegionalSegs(rows){
    const tb = document.getElementById('tblRegionalSegs');
    tb.innerHTML = '';
    rows.forEach(r => {
      const dt = r.createdAt ? new Date(r.createdAt) : null;
      const dateTxt = dt ? dt.toLocaleString(APP_LOCALE) : '';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escapeHtml(dateTxt)}</td>
        <td>${escapeHtml(r.label || '')}</td>
        <td>${Number(r.pct || 0).toFixed(2)}%</td>
        <td>${fmtMoney(r.remainingBefore)}</td>
        <td><b>${fmtMoney(r.amountSegmented)}</b></td>
        <td>${fmtMoney(r.remainingAfter)}</td>
      `;
      tb.appendChild(tr);
    });
  }

  function renderBaseTable(t){
    const head = document.getElementById('baseHead');
    const body = document.getElementById('baseBody');
    const info = document.getElementById('basePagerInfo');

    head.innerHTML = '';
    body.innerHTML = '';

    const cols = t.columns || [];
    cols.forEach(c => {
      const th = document.createElement('th');
      th.textContent = c;
      head.appendChild(th);
    });

    (t.rows || []).forEach(r => {
      const tr = document.createElement('tr');
      cols.forEach((_, idx) => {
        const td = document.createElement('td');
        td.textContent = r[idx] === null || r[idx] === undefined ? '' : String(r[idx]);
        tr.appendChild(td);
      });
      body.appendChild(tr);
    });

    const total = t.total || 0;
    const from = (t.offset || 0) + 1;
    const to = Math.min((t.offset || 0) + (t.limit || 0), total);
    info.textContent = total ? `Mostrando ${from}-${to} de ${total}` : 'Sin registros';
  }

  async function loadUsers(){
    if (SESSION_USER.role !== 'ADMIN') return;
    Busy.show('Cargando usuarios…');
    try {
      const res = await callServer('apiListUsers');
      if (!res.ok) throw new Error(res.message || 'Error');
      const tb = document.getElementById('tblUsers');
      tb.innerHTML = '';
      res.data.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(u.email)}</td>
          <td>${escapeHtml(u.name || '')}</td>
          <td>${escapeHtml(u.role)}</td>
          <td>${escapeHtml(u.status)}</td>
          <td>${escapeHtml(u.createdAt ? new Date(u.createdAt).toLocaleString(APP_LOCALE) : '')}</td>
        `;
        tb.appendChild(tr);
      });
    } catch (e) {
      await modal(String(e.message || e), 'Error');
    } finally {
      Busy.hide();
    }
  }

  async function saveUser(){
    const email = String(document.getElementById('uEmail').value || '').trim();
    const name = String(document.getElementById('uName').value || '').trim();
    const role = String(document.getElementById('uRole').value || '').trim();
    const status = String(document.getElementById('uStatus').value || '').trim();

    if (!email) return modal('Email requerido.', 'Validación');

    Busy.show('Guardando usuario…');
    try {
      const res = await callServer('apiUpsertUser', { email, name, role, status });
      if (!res.ok) throw new Error(res.message || 'Error');
      document.getElementById('uEmail').value = '';
      document.getElementById('uName').value = '';
      await loadUsers();
      await modal('Usuario guardado.', 'OK');
    } catch (e) {
      console.error('saveUser error', e);
      await modal(String(e.message || e), 'Error');
    } finally {
      Busy.hide();
    }
  }

  async function showSegmentationDetail(segId){
    Busy.show('Cargando detalle…');
    try {
      const res = await callServer('apiGetSegmentationDetail', { segId });
      if (!res.ok) throw new Error(res.message || 'Error');

      const tb = document.getElementById('tblSegDetailBody');
      const tf = document.getElementById('tSegDetailTotal');
      tb.innerHTML = '';

      (res.data.rows || []).forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${escapeHtml(r.regional)}</td><td>${fmtMoney(r.amount)}</td>`;
        tb.appendChild(tr);
      });

      tf.textContent = fmtMoney(res.data.total);
      document.getElementById('modalDetail').hidden = false;

    } catch (e) {
      console.error('showSegmentationDetail error', e);
      await modal(String(e.message || e), 'Error');
    } finally {
      Busy.hide();
    }
  }

  function escapeHtml(s){
    return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  }

  // Start
  bootstrap();
</script>
