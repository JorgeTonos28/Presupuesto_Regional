<section id="viewRegionalSection" class="view">
  <div class="grid">
    <div class="col-12 card">
      <div class="row">
        <div>
          <label>Año</label>
          <select id="yearSelectRegional"></select>
        </div>
        <div>
          <label>Regional</label>
          <select id="regionalSelect"></select>
        </div>
        <div>
          <button class="btn btn-primary" id="btnLoadRegional">Cargar detalle</button>
        </div>
      </div>
    </div>

    <div class="col-4 card">
      <div class="muted">Base</div>
      <div style="font-size:22px;font-weight:800" id="rBase">—</div>
    </div>
    <div class="col-4 card">
      <div class="muted">Presupuestado</div>
      <div style="font-size:22px;font-weight:800" id="rSeg">—</div>
    </div>
    <div class="col-4 card">
      <div class="muted">Disponible</div>
      <div style="font-size:22px;font-weight:800" id="rRem">—</div>
    </div>

    <div class="col-12">
      <div style="font-weight:800;margin:8px 0">Histórico de segmentaciones (esta regional)</div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Etiqueta</th>
              <th>%</th>
              <th>Disponible antes</th>
              <th>Presupuestado</th>
              <th>Disponible después</th>
            </tr>
          </thead>
          <tbody id="tblRegionalSegs"></tbody>
        </table>
      </div>
    </div>

    <div class="col-12">
      <!-- Filtros de Provincia y Búsqueda -->
      <div class="card" style="margin-bottom: 12px;">
         <div class="row">
             <div>
                 <label>Filtrar por Provincia (Detalle abajo)</label>
                 <select id="provinceSelect">
                     <option value="">Cargando...</option>
                 </select>
             </div>
             <div>
                 <label>Buscar en Base de Datos</label>
                 <input type="text" id="regionalFilter" placeholder="Escribe palabras clave (ej: 1000 curso)">
             </div>
         </div>
      </div>

      <div id="provinceDetailContainer"></div>

      <div style="font-weight:800;margin:12px 0">Base de datos Completa (Regional)</div>
      <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
        <table>
          <thead style="position: sticky; top: 0; background: #f3f4f6; z-index: 5;"><tr id="baseHead"></tr></thead>
          <tbody id="baseBody"></tbody>
        </table>
      </div>
      <div class="muted" id="basePagerInfo" style="margin-top: 4px;"></div>
    </div>
  </div>
</section>
