<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #f9fafb;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --primary: #2563eb;
        --danger: #dc2626;
      }
      body {
        font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .card {
        background: white;
        max-width: 480px;
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        text-align: center;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px auto;
        color: var(--danger);
        background: #fee2e2;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 32px;
        height: 32px;
      }
      .title {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 12px;
      }
      .message {
        font-size: 16px;
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .muted {
        color: var(--muted);
        font-size: 14px;
        background: var(--bg);
        padding: 12px;
        border-radius: 8px;
        border: 1px dashed var(--border);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
      </div>
      <div class="title">Acceso Restringido</div>
      <div class="message"><?= message ?></div>
      <div class="muted">
        Si consideras que esto es un error o necesitas acceso al sistema, por favor solicita al Administrador que habilite tu cuenta en la pestaña de <b>Usuarios</b>.
      </div>
    </div>
  </body>
</html>
