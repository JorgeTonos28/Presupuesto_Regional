<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #f9fafb;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --primary: #2563eb;
        --danger: #dc2626;
      }
      html { height: 100%; }
      body {
        font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .main-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .card {
        background: white;
        max-width: 480px;
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        text-align: center;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px auto;
        color: var(--danger);
        background: #fee2e2;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 32px;
        height: 32px;
      }
      .title {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 12px;
      }
      .message {
        font-size: 16px;
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .muted {
        color: var(--muted);
        font-size: 14px;
        background: var(--bg);
        padding: 12px;
        border-radius: 8px;
        border: 1px dashed var(--border);
        margin-bottom: 16px;
      }
      .contact-info {
        text-align: left;
        background: #eff6ff;
        border-left: 4px solid var(--primary);
        padding: 12px;
        border-radius: 4px;
        font-size: 14px;
        color: #1e3a8a;
      }
      .contact-info p { margin: 4px 0; }
      .contact-info strong { font-weight: 700; }

      .footer{
        display:flex; justify-content:space-between;
        align-items: center;
        padding:12px 16px; border-top:1px solid var(--border);
        color:var(--muted); font-size:12px;
        background: white;
      }
      .footer-left { display: flex; gap: 10px; }
      .footer-center { flex: 1; text-align: center; font-weight: bold; }
      .footer-signature { object-fit: contain; }
    </style>
  </head>
  <body>
    <main class="main-content">
      <div class="card">
        <div class="icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <div class="title">Acceso Restringido</div>
        <div class="message"><?= message ?></div>
        <div class="muted">
          Si consideras que esto es un error o necesitas acceso al sistema, por favor solicita al Administrador que habilite tu cuenta.
        </div>

        <? if (adminName || adminEmail || adminExt) { ?>
        <div class="contact-info">
          <p style="margin-bottom: 8px; color: var(--primary); font-weight: bold;">Contacto del Administrador:</p>
          <? if (adminName) { ?><p><strong>Nombre:</strong> <?= adminName ?></p><? } ?>
          <? if (adminEmail) { ?><p><strong>Correo:</strong> <a href="mailto:<?= adminEmail ?>" style="color: inherit; text-decoration: underline;"><?= adminEmail ?></a></p><? } ?>
          <? if (adminExt) { ?><p><strong>Extensión:</strong> <?= adminExt ?></p><? } ?>
        </div>
        <? } ?>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-left">
        <span>Versión: <?= APP_VERSION ?></span>
      </div>
      <div class="footer-center">Dirección de Innovación</div>
      <div class="footer-right">
        <? if (signatureUrl) { ?>
          <img alt="Firma Desarrollador" class="footer-signature" src="<?= signatureUrl ?>" style="width: <?= signatureWidth ?>; height: <?= signatureHeight ?>;">
        <? } ?>
      </div>
    </footer>
  </body>
</html>
