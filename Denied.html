<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: Arial, sans-serif; padding: 24px; }
      .card { max-width: 720px; border: 1px solid #e5e7eb; border-radius: 12px; padding: 18px; }
      .title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
      .muted { color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">Acceso denegado</div>
      <p><?= message ?></p>
      <p class="muted">Si necesitas acceso, solicita al Administrador que te agregue en la pestaña <b>Usuarios</b>.</p>
    </div>
  </body>
</html>
