<style>
  [hidden] { display: none !important; }
  :root{
    --bg:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --border:#e5e7eb;
    --primary:#2563eb;
    --danger:#dc2626;
    --card:#f9fafb;
  }
  *{ box-sizing:border-box; }
  html { height: 100%; }
  body{
    margin:0;
    font-family: Arial, sans-serif;
    color:var(--text);
    background:var(--bg);
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  .topbar{
    display:flex;
    gap:16px;
    align-items:center;
    justify-content:space-between;
    padding:14px 16px;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    background:var(--bg);
    z-index:10;
    flex-wrap: wrap; /* Allow wrapping on small screens */
  }
  .brand-left {
    display: flex;
    align-items: center;
    flex: 1; /* Take space but allow center to be centered if possible, or just space-between */
  }
  .brand-logo { height: 40px; width: auto; margin-right: 10px; object-fit: contain; }

  /* Center branding */
  .brand-center {
      text-align: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
  }
  .brand-title{ font-weight:800; font-size:20px; font-family: 'Roboto', 'Segoe UI', sans-serif; }
  .brand-subtitle{ color:var(--muted); font-size:13px; margin-top:2px; }

  .nav{ display:flex; gap:8px; flex-wrap:wrap; z-index: 11; /* Ensure nav is clickable */ }

  @media (max-width: 900px){
    .topbar{ align-items:center; flex-direction:column; gap: 10px; }
    .brand-center { position: static; transform: none; margin: 8px 0; }
    .nav { width: 100%; justify-content: center; }
  }
  .nav-btn{
    border:1px solid var(--border);
    background:white;
    padding:8px 10px;
    border-radius:10px;
    cursor:pointer;
  }
  .nav-btn.active{
    border-color:var(--primary);
    color:var(--primary);
    font-weight:700;
  }
  .container{
    padding:16px;
    max-width:1200px;
    margin:0 auto;
    width: 100%;
    flex: 1;
  }
  .footer{
    display:flex; justify-content:space-between;
    align-items: center;
    padding:12px 16px; border-top:1px solid var(--border);
    color:var(--muted); font-size:12px;
  }
  .footer-left { display: flex; gap: 10px; }
  .footer-center { flex: 1; text-align: center; font-weight: bold; }
  .footer-signature { height: 40px; width: auto; object-fit: contain; }
  .muted{ color:var(--muted); }
  .card{
    border:1px solid var(--border);
    background:var(--card);
    border-radius:14px;
    padding:14px;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(12, 1fr);
    gap:12px;
  }
  .col-4{ grid-column: span 4; }
  .col-6{ grid-column: span 6; }
  .col-12{ grid-column: span 12; }
  @media (max-width: 900px){
    .col-4,.col-6{ grid-column: span 12; }
    /* Topbar responsive is handled above, but grid stack is crucial */
    .grid { display: flex; flex-direction: column; }
  }
  label{ font-size:12px; color:var(--muted); display:block; margin-bottom:6px; }
  input, select{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:10px;
    background:white;
  }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .row > div{ flex:1; min-width: 160px; }
  .btn{
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:white;
    cursor:pointer;
  }
  .btn-primary{
    background:var(--primary);
    border-color:var(--primary);
    color:white;
    font-weight:700;
  }
  .btn-danger{
    background:var(--danger);
    border-color:var(--danger);
    color:white;
    font-weight:700;
  }
  .table-responsive {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }
  table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
  }
  th, td{
    padding:10px;
    border-bottom:1px solid var(--border);
    text-align:left;
    font-size:13px;
  }
  th{ background:#f3f4f6; font-size:12px; color:#374151; }
  .pill{
    display:inline-block;
    padding:2px 8px;
    border:1px solid var(--border);
    border-radius:999px;
    font-size:12px;
    color:var(--muted);
    background:#fff;
  }
  /* Overlay & modal */
  .overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(17,24,39,.45);
    z-index:50;
  }
  #modal, #modalDetail, #modalSegmentation {
    z-index: 200 !important;
  }
  .overlay-card, .modal-card{
    width:min(520px, 92vw);
    background:white;
    border-radius:16px;
    border:1px solid var(--border);
    padding:14px;
  }
  .spinner{
    width:24px; height:24px;
    border:3px solid #e5e7eb;
    border-top-color: var(--primary);
    border-radius:50%;
    animation: spin 1s linear infinite;
    margin-bottom:10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-title{ font-weight:800; margin-bottom:8px; }
  .modal-msg{ color:#374151; margin-bottom:12px; white-space: pre-wrap; }
  .modal-actions{ display:flex; gap:8px; justify-content:flex-end; }
  .view{ display:none; }
  .view.active{ display:block; }
</style>
